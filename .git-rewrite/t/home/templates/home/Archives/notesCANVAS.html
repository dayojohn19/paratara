<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVASS</title>
</head>
<script>
    window.onload = function () {
        var w3rcanvas = document.getElementById("w3rCanvasTag");
        var w3rcontext = w3rcanvas.getContext('2d');
        var w3rgradient = w3rcontext.createRadialGradient(200, 100, 0, 100, 100, 100);
        w3rgradient.addColorStop("0", "magenta");// Adds a color stop to a gradient. A color stop is a position in the gradient where a color 							change occurs. The offset must be between 0 and 1.
        w3rgradient.addColorStop(".25", "blue");
        w3rgradient.addColorStop(".50", "green");
        w3rgradient.addColorStop(".75", "yellow");
        w3rgradient.addColorStop("1.0", "red");
        w3rcontext.fillStyle = w3rgradient;
        w3rcontext.fillRect(0, 0, 400, 400);

    }
</script>

<script>

    <!-- CIRCLE -->

    <canvas id="myCanvas" width="578" height="200"></canvas>
    <script>
        var canvas = document.getElementById('myCanvas');
        var context = canvas.getContext('2d');
        var centerX = canvas.width / 2;
        var centerY = canvas.height / 2;
        var radius = 70;

        context.beginPath();
        context.arc(centerX, centerY, radius, 0, 2 * Math.PI, false);
        // context.fillStyle = 'green';
        contextFill = context.createLinearGradient(50, 50, 90, 200);
        contextFill.addColorStop(0, "rgba(0,255,0,0.5)");
        contextFill.addColorStop(1, "white");
        // context.fillRect(0, 0, 400, 400);

        // y = 0.24
        // context.fillStyle = `rgba(255,0,0,${y})`;
        context.fillStyle = contextFill;
        // context.fillRect(0, 0, 400, 400);

        context.fill();

        // context.strokeStyle = '#003300';
        // context.stroke();

        // context.fillRect(90, 90, 300, 300);

    </script>
