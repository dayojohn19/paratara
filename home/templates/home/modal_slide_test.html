<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Page content */
.main {
  padding: 20px;
}

/* Fullscreen sliding modal */
.modal-for-blog {
  position: fixed;
  top: 0;
  right: -100%;
  width: 100%;
  height: 100%;
  background: white;
  z-index: 1000;
  transition: right 0.4s ease;
  overflow-y: auto;
}

/* Active state */
.modal-for-blog.show {
  right: 0;
}

/* Close button */
.close-modal-for-blog {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
  font-size: 24px;
}
</style>
</head>
<body>

<div class="main">
  <a href="page2.html" id="openPage">Open Page</a>
</div>

<div class="modal" id="modal-for-blog-id">
  <span class="close-btn" id="closeBtn">&times;</span>
  <div id="modalContent"></div>
</div>

<script>
const modal = document.getElementById("modal-for-blog-id");
const modalContent = document.getElementById("modalContent");

</script>

</body>
</html>
