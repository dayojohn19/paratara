{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog + PayPal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
<div class="btn-group my-3">
  <button class="btn btn-outline-primary" onclick="payWith(250)">Basic - ₱250</button>
  <button class="btn btn-outline-success" onclick="payWith(500)">Premium - ₱500</button>
  <button class="btn btn-outline-warning" onclick="payWith(1000)">Subscription - ₱1000</button>
  
</div>

<div id="paypal-button-container"></div>


<!-- <script src="https://www.paypal.com/sdk/js?client-id={{ paypal_client_id }}&currency=PHP"></script> -->
<script src="https://www.paypal.com/sdk/js?client-id={{ paypal_client_id }}&currency=PHP&locale=fil_PH"></script>

<script>
  let selectedAmount = 5; // default

  function payWith(amount) {
    selectedAmount = amount;
    document.getElementById("paypal-button-container").innerHTML = ""; // clear previous
    renderButton();
  }

  function renderButton() {
    paypal.Buttons({
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            amount: { value: selectedAmount.toFixed(2) }
          }]
        });
      },
      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          alert("✅ Paid $" + selectedAmount + " by " + details.payer.name.given_name);

          // Send to Django backend for saving
          fetch("/paypal/webhook/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              event_type: "PAYMENT.CAPTURE.COMPLETED",
              resource: {
                id: data.orderID,
                payer: { email_address: details.payer.email_address },
                amount: { value: selectedAmount }
              }
            })
          });
        });
      }
    }).render("#paypal-button-container");
  }

  // render first button
  renderButton();
</script>

</body>
</html>
