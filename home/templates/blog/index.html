{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/master.css' %}" />
    <style>
      * {
        max-width: 100%;
        max-width: 100vw;
      }
      .simple-form {
        background-color: rgb(250, 250, 250);
        border-radius: 8px;
        box-shadow: 0px 0px 5px rgb(225, 225, 225);
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div style="margin: 10px">
      {% if not message %}
      <h1>Profile</h1>
      {% endif %}
      <form class="simple-form" enctype="multipart/form-data" method="post">
        {% csrf_token %}
        <div>
          <div class="form-group row">
            <label class="col-sm-2 col-form-label" for="profile">Profile Link</label>
            <div class="col-sm-10">
              <input class="form-control" value="{{profile_link}}" name="profile" placeholder="Profile Photo Link Here" />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-sm-2 col-form-label" for="bloggerURL">Personal URL</label>
            <div class="col-sm-10">
              <input class="form-control" value="{{currentUser.bloggerURL}}" name="bloggerURL" placeholder="blogger URL" />
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="col-sm-2 col-form-label" for="aboutme">About You</label>
          <textarea class="form-control" rows="3" value="{{currentUser.aboutme}}" name="aboutme" placeholder="aboutme">{{currentUser.aboutme}}</textarea>
        </div>
        <div class="form-group">
          <label class="col-sm-2 col-form-label" for="shortsay">Short Say</label>
          <textarea class="form-control" rows="1" value="{{currentUser.shortsay}}" name="shortsay" maxlength="64" placeholder="Short Saying">{{currentUser.shortsay}}</textarea>
        </div>

        <input hidden readonly name="blog" value="blogger" />
        <div class="form-group row">
          <div class="col-sm-10">
            {% if currentUser %}
            <button class="btn btn-primary" action="submit">Edit</button>
            {% else %}
            <button class="btn btn-primary" action="submit">Submit</button>
            {% endif %}
          </div>
        </div>
      </form>
    </div>
    <hr />
    {% if message %}
    <h1 style="text-align: center">{{message}}</h1>
    {% endif %}
    <hr />

    {% if form %}
    <div style="margin: 10px">
      {% if not message %}
      <h1>Create Blog Post</h1>
      {% endif %}
      <form class="simple-form" action="/apis/blog/" enctype="multipart/form-data" method="post">
        {% csrf_token %}
        <div class="form-row">
          <div class="form-group col-md-5">
            <label for="placename">Place Name</label>
            <input class="form-control" type="text" name="placename" id="" placeholder="......." />
          </div>
          <div class="form-group col-md-3">
            <label for="customTime">Date Taken</label>
            <input class="form-control" name="customTime" type="date" placeholder="May 01 2023" />
          </div>
        </div>

        <div class="form-group">
          <label class="col-sm-2 col-form-label" for="postUrl">Post URL</label>
          <input class="form-control" rows="1" name="postUrl" type="url" placeholder="...." />
        </div>
        <div class="form-group">
          <label class="col-sm-2 col-form-label" for="title">Post Title</label>
          <input class="form-control" rows="1" maxlength="20" name="title" placeholder="...." />
        </div>
        <div class="form-group">
          <label class="col-sm-2 col-form-label" for="context">Post Context</label>
          <textarea class="form-control" type="text" name="context" id="" placeholder="Elaborate the Place, what is it for them....."></textarea>
        </div>

        <div class="row">
          <div class="col">
            <label class="col-sm-2 col-form-label" for="mixCoordinate">Mixed Coordinates</label>
            <input class="form-control" name="mixCoordinate" type="text" placeholder=".." />
          </div>

          <div class="col">
            <label class="col-sm-2 col-form-label" for="latitude">Latitude</label>
            <input class="form-control" name="latitude" type="number" placeholder=".." />
          </div>
          <div class="col">
            <label class="col-sm-2 col-form-label" for="longitude">Longitude</label>
            <input class="form-control" name="longitude" type="number" placeholder=".." />
          </div>
        </div>
        <input hidden name="purpose" value="blog" />
        <input hidden name="blog" value="blog" />
        <div class="form-group">
          <label class="col-sm-2 col-form-label" for="imageUrl">Upload Image</label>
          <!-- <input name="imageUrl" type="" placeholder="...." /> -->
          {{form.image}}
          <!-- <input class="form-control-file" name="thismatter" type="file" /> -->
        </div>
        <!-- <div class="form-group row">
          <div class="col-sm-10">
            <button class="btn btn-primary" action="submit">Create Post</button>
          </div>
          [Log] <div id="current-ImageUrl" style="background-image: url("https://drive.google.com/uc?export=view&id=1qJJ5JJJkGsDNWTaShrZ4pDuDV84mTV-N");"></div> (index.js, line 99)

        </div> -->
      </form>
    </div>
    {% endif %}


<div class="itinerary-container">
  <figure class="itinerary-embed">
    <a href="https://roamaround.app/itinerary/siargao-island/3-days/68e0d18fdd61df34a66b6376?utm_source=embed" target="_blank" rel="noopener noreferrer">
      <img src="https://roamaround.app/api/embedPlanImage?place=Siargao+Island&days=3" 
           alt="Siargao Island 3-Day Itinerary - Plan Trips AI" 
           loading="lazy" />
    </a>
    <figcaption>
      Explore this <a href="https://roamaround.app/itinerary/siargao-island/3-days/68e0d18fdd61df34a66b6376?utm_source=embed" target="_blank">3-Day Siargao Itinerary</a> by RoamAround.
    </figcaption>
  </figure>
</div>



  </body>
</html>
