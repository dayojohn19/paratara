{% load static %}
{% block body %}
<!-- CSS only -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
<link href="{% static 'bootstrap/assets/dist/css/bootstrap.min.css' %}" rel="stylesheet" />

<style>
  @custom-variant dark (&:is(.dark *));

:root {
  /* Executive Color Palette - Sophisticated & Luxurious */
  --brand-1: #1a2942;
  --brand-2: #0f1d33;
  --accent-gold: #d4af37;
  --accent-gold-light: #e8c96f;
  --accent-gold-dark: #b8941f;
  --ink: #1a1f36;
  --ink-light: #4a5568;
  --muted: #64748b;
  --surface: #ffffff;
  --surface-elevated: #fafbfc;
  --surface-2: #f8f9fb;
  --stroke: #e2e8f0;
  --stroke-subtle: #f1f5f9;
  --stroke-strong: rgba(212, 175, 55, 0.35);
  
  /* Premium Shadows */
  --shadow-xl: 0 32px 80px rgba(26, 41, 66, 0.25), 0 0 1px rgba(26, 41, 66, 0.31);
  --shadow-lg: 0 24px 60px rgba(26, 41, 66, 0.18), 0 0 1px rgba(26, 41, 66, 0.24);
  --shadow-md: 0 12px 32px rgba(26, 41, 66, 0.12), 0 0 1px rgba(26, 41, 66, 0.16);
  --shadow-sm: 0 4px 16px rgba(26, 41, 66, 0.08), 0 0 1px rgba(26, 41, 66, 0.12);
  --shadow-gold: 0 8px 24px rgba(212, 175, 55, 0.25);
  
  /* Refined Border Radius */
  --radius-xl: 16px;
  --radius-lg: 12px;
  --radius-md: 8px;
  --radius-sm: 6px;
  
  /* Premium Easing */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  
  /* Typography Tokens */
  --font-size: 16px;
  --font-weight-medium: 600;
  --font-weight-normal: 400;
  --letter-spacing-tight: -0.02em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.025em;
  
  /* Design System Tokens */
  --background: #ffffff;
  --foreground: oklch(0.145 0 0);
  --card: #ffffff;
  --card-foreground: oklch(0.145 0 0);
  --popover: oklch(1 0 0);
  --popover-foreground: oklch(0.145 0 0);
  --primary: #1a2942;
  --primary-foreground: oklch(1 0 0);
  --secondary: oklch(0.95 0.0058 264.53);
  --secondary-foreground: #1a2942;
  --muted: #f8f9fb;
  --muted-foreground: #64748b;
  --accent: #d4af37;
  --accent-foreground: #1a2942;
  --destructive: #dc2626;
  --destructive-foreground: #ffffff;
  --border: rgba(0, 0, 0, 0.08);
  --input: transparent;
  --input-background: #f8f9fb;
  --switch-background: #cbd5e1;
  --ring: oklch(0.708 0 0);
  --chart-1: oklch(0.646 0.222 41.116);
  --chart-2: oklch(0.6 0.118 184.704);
  --chart-3: oklch(0.398 0.07 227.392);
  --chart-4: oklch(0.828 0.189 84.429);
  --chart-5: oklch(0.769 0.188 70.08);
  --radius: 0.75rem;
  --sidebar: oklch(0.985 0 0);
  --sidebar-foreground: oklch(0.145 0 0);
  --sidebar-primary: #1a2942;
  --sidebar-primary-foreground: oklch(0.985 0 0);
  --sidebar-accent: oklch(0.97 0 0);
  --sidebar-accent-foreground: oklch(0.205 0 0);
  --sidebar-border: oklch(0.922 0 0);
  --sidebar-ring: oklch(0.708 0 0);
}

.dark {
  --background: oklch(0.145 0 0);
  --foreground: oklch(0.985 0 0);
  --card: oklch(0.145 0 0);
  --card-foreground: oklch(0.985 0 0);
  --popover: oklch(0.145 0 0);
  --popover-foreground: oklch(0.985 0 0);
  --primary: oklch(0.985 0 0);
  --primary-foreground: oklch(0.205 0 0);
  --secondary: oklch(0.269 0 0);
  --secondary-foreground: oklch(0.985 0 0);
  --muted: oklch(0.269 0 0);
  --muted-foreground: oklch(0.708 0 0);
  --accent: oklch(0.269 0 0);
  --accent-foreground: oklch(0.985 0 0);
  --destructive: oklch(0.396 0.141 25.723);
  --destructive-foreground: oklch(0.637 0.237 25.331);
  --border: oklch(0.269 0 0);
  --input: oklch(0.269 0 0);
  --ring: oklch(0.439 0 0);
  --font-weight-medium: 600;
  --font-weight-normal: 400;
  --chart-1: oklch(0.488 0.243 264.376);
  --chart-2: oklch(0.696 0.17 162.48);
  --chart-3: oklch(0.769 0.188 70.08);
  --chart-4: oklch(0.627 0.265 303.9);
  --chart-5: oklch(0.645 0.246 16.439);
  --sidebar: oklch(0.205 0 0);
  --sidebar-foreground: oklch(0.985 0 0);
  --sidebar-primary: oklch(0.488 0.243 264.376);
  --sidebar-primary-foreground: oklch(0.985 0 0);
  --sidebar-accent: oklch(0.269 0 0);
  --sidebar-accent-foreground: oklch(0.985 0 0);
  --sidebar-border: oklch(0.269 0 0);
  --sidebar-ring: oklch(0.439 0 0);
}

@theme inline {
  --color-background: var(--background);
  --color-foreground: var(--foreground);
  --color-card: var(--card);
  --color-card-foreground: var(--card-foreground);
  --color-popover: var(--popover);
  --color-popover-foreground: var(--popover-foreground);
  --color-primary: var(--primary);
  --color-primary-foreground: var(--primary-foreground);
  --color-secondary: var(--secondary);
  --color-secondary-foreground: var(--secondary-foreground);
  --color-muted: var(--muted);
  --color-muted-foreground: var(--muted-foreground);
  --color-accent: var(--accent);
  --color-accent-foreground: var(--accent-foreground);
  --color-destructive: var(--destructive);
  --color-destructive-foreground: var(--destructive-foreground);
  --color-border: var(--border);
  --color-input: var(--input);
  --color-input-background: var(--input-background);
  --color-switch-background: var(--switch-background);
  --color-ring: var(--ring);
  --color-chart-1: var(--chart-1);
  --color-chart-2: var(--chart-2);
  --color-chart-3: var(--chart-3);
  --color-chart-4: var(--chart-4);
  --color-chart-5: var(--chart-5);
  --radius-sm: calc(var(--radius) - 4px);
  --radius-md: calc(var(--radius) - 2px);
  --radius-lg: var(--radius);
  --radius-xl: calc(var(--radius) + 4px);
  --color-sidebar: var(--sidebar);
  --color-sidebar-foreground: var(--sidebar-foreground);
  --color-sidebar-primary: var(--sidebar-primary);
  --color-sidebar-primary-foreground: var(--sidebar-primary-foreground);
  --color-sidebar-accent: var(--sidebar-accent);
  --color-sidebar-accent-foreground: var(--sidebar-accent-foreground);
  --color-sidebar-border: var(--sidebar-border);
  --color-sidebar-ring: var(--sidebar-ring);
}

@layer base {
  * {
    @apply border-border outline-ring/50;
    box-sizing: border-box;
  }

  body {
    @apply bg-background text-foreground;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(180deg, #f8f9fb 0%, #ffffff 100%);
    background-attachment: fixed;
    min-height: 100vh;
    padding: 3rem 1.5rem;
    position: relative;
  }
  
  /* Subtle background texture for premium feel */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: 
      radial-gradient(circle at 20% 10%, rgba(212, 175, 55, 0.03), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(26, 41, 66, 0.02), transparent 40%);
    z-index: 0;
  }
}

/**
 * Luxurious Form Styles - Executive Design
 */
@layer components {
  .form-container {
    max-width: 800px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-xl);
    overflow: hidden;
    position: relative;
    z-index: 1;
    border: 1px solid rgba(226, 232, 240, 0.8);
    transition: transform 420ms var(--ease-out), box-shadow 420ms var(--ease-out);
  }

  .form-container:hover {
    transform: translateY(-4px);
    box-shadow: 0 40px 100px rgba(26, 41, 66, 0.28), 0 0 1px rgba(26, 41, 66, 0.35);
  }

  .form-header {
    background: linear-gradient(135deg, var(--brand-1) 0%, var(--brand-2) 100%);
    color: white;
    padding: 3rem 2.5rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  
  /* Premium gold accent bar */
  .form-header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, 
      transparent 0%, 
      var(--accent-gold) 25%, 
      var(--accent-gold-light) 50%, 
      var(--accent-gold) 75%, 
      transparent 100%);
    box-shadow: 0 2px 12px rgba(212, 175, 55, 0.4);
  }

  .form-header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 800px 300px at 50% -20%, rgba(212, 175, 55, 0.12), transparent 60%),
      radial-gradient(ellipse 600px 200px at 20% 100%, rgba(255, 255, 255, 0.05), transparent 50%);
    pointer-events: none;
  }

  .form-header h1 {
    margin: 0;
    font-size: 2.25rem;
    font-weight: 700;
    letter-spacing: var(--letter-spacing-tight);
    text-shadow: 0 2px 16px rgba(0, 0, 0, 0.2);
    position: relative;
    z-index: 1;
    background: linear-gradient(135deg, #ffffff 30%, var(--accent-gold-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .progress-bar-container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    height: 8px;
    margin-top: 1.5rem;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    z-index: 1;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .step-indicator {
    margin-top: 1rem;
    font-size: 0.875rem;
    font-weight: 600;
    letter-spacing: var(--letter-spacing-wide);
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.85);
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    position: relative;
    z-index: 1;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-gold-dark) 0%, var(--accent-gold-light) 100%);
    width: 0%;
    transition: width 600ms var(--ease-out);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
  }

  .progress-bar-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: -50%;
    height: 100%;
    width: 50%;
    background: linear-gradient(90deg, 
      rgba(255, 255, 255, 0), 
      rgba(255, 255, 255, 0.4), 
      rgba(255, 255, 255, 0));
    animation: shimmer 2s var(--ease-in-out) infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(0); }
    100% { transform: translateX(400%); }
  }

  .form-body {
    padding: 3rem 2.5rem;
    background: var(--surface);
  }

  .form-step {
    display: none;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 480ms var(--ease-out), transform 480ms var(--ease-out);
    will-change: opacity, transform;
  }

  .form-step.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
    animation: elegantFadeIn 480ms var(--ease-out);
  }

  .form-step.leaving {
    display: block;
    animation: elegantFadeOut 320ms var(--ease-out) forwards;
  }

  @keyframes elegantFadeIn {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes elegantFadeOut {
    from {
      opacity: 1;
      transform: translateY(0);
    }
    to {
      opacity: 0;
      transform: translateY(-8px);
    }
  }

  .question-block {
    margin-bottom: 2rem;
    padding: 1.75rem;
    background: var(--surface-2);
    border-radius: var(--radius-lg);
    border: 1px solid var(--stroke-subtle);
    border-left: 3px solid var(--accent-gold);
    transition: 
      transform 280ms var(--ease-out), 
      box-shadow 280ms var(--ease-out), 
      border-color 280ms var(--ease-out), 
      background 280ms var(--ease-out);
    position: relative;
  }
  
  .question-block::before {
    content: '';
    position: absolute;
    left: -3px;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent-gold-light) 0%, var(--accent-gold-dark) 100%);
    opacity: 0;
    transition: opacity 280ms var(--ease-out);
  }

  .question-block:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    background: var(--surface);
    border-left-color: var(--accent-gold-light);
  }
  
  .question-block:hover::before {
    opacity: 1;
  }

  .question-block:focus-within {
    border-color: var(--stroke-strong);
    box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.08), var(--shadow-md);
    background: var(--surface);
  }
  
  .question-block:focus-within::before {
    opacity: 1;
  }

  label {
    font-size: 1rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 0.75rem;
    display: block;
    letter-spacing: var(--letter-spacing-normal);
  }

  .form-control,
  .form-select {
    width: 100%;
    border-radius: var(--radius-md);
    border: 2px solid var(--stroke);
    padding: 0.875rem 1.125rem;
    font-size: 1rem;
    transition: 
      border-color 280ms var(--ease-out), 
      box-shadow 280ms var(--ease-out), 
      transform 280ms var(--ease-out),
      background 280ms var(--ease-out);
    background: white;
    color: var(--ink);
    font-weight: 400;
  }

  .form-control:focus,
  .form-select:focus {
    border-color: var(--accent-gold);
    box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.12), var(--shadow-sm);
    outline: none;
    transform: translateY(-1px);
    background: white;
  }
  
  .form-control::placeholder {
    color: var(--muted);
  }

  .amenities-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.25rem;
    margin-top: 1.25rem;
  }

  .amenity-item {
    background: white;
    padding: 1.25rem;
    border-radius: var(--radius-lg);
    border: 2px solid var(--stroke);
    transition: 
      transform 280ms var(--ease-out), 
      border-color 280ms var(--ease-out), 
      box-shadow 280ms var(--ease-out), 
      background 280ms var(--ease-out);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  
  /* .amenity-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.03) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 280ms var(--ease-out);
  } */

  .amenity-item:hover {
    border-color: var(--accent-gold);
    background: var(--surface-elevated);
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }
  
  .amenity-item:hover::before {
    opacity: 1;
  }

  .amenity-item:has(input[type="checkbox"]:checked),
  .amenity-item:has(input[type="radio"]:checked) {
    border-color: var(--accent-gold);
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.06) 0%, rgba(212, 175, 55, 0.02) 100%);
    box-shadow: 0 8px 24px rgba(212, 175, 55, 0.15), var(--shadow-gold);
  }
  
  .amenity-item:has(input[type="checkbox"]:checked)::before,
  .amenity-item:has(input[type="radio"]:checked)::before {
    opacity: 1;
  }

  .amenity-item:has(input[type="checkbox"]:checked)::after,
  .amenity-item:has(input[type="radio"]:checked)::after {
    content: '✓';
    position: absolute;
    top: 12px;
    right: 12px;
    width: 28px;
    height: 28px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-dark) 100%);
    color: white;
    font-weight: 700;
    font-size: 0.875rem;
    box-shadow: var(--shadow-gold);
    animation: checkmarkPop 400ms var(--ease-out);
  }
  
  @keyframes checkmarkPop {
    0% {
      transform: scale(0) rotate(-180deg);
      opacity: 0;
    }
    50% {
      transform: scale(1.1) rotate(10deg);
    }
    100% {
      transform: scale(1) rotate(0deg);
      opacity: 1;
    }
  }

  .amenity-item input[type="checkbox"],
  .amenity-item input[type="radio"] {
    margin-right: 0.75rem;
    cursor: pointer;
    width: 20px;
    height: 20px;
    accent-color: var(--accent-gold);
  }

  .amenity-item label {
    margin: 0;
    /* cursor: pointer; */
    font-weight: 500;
    font-size: 0.9375rem;
    color: var(--ink-light);
    letter-spacing: var(--letter-spacing-normal);
  }

  .btn-group-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 2.5rem;
    gap: 1.25rem;
    padding-top: 2rem;
    border-top: 1px solid var(--stroke-subtle);
  }

  .btn {
    padding: 1rem 2.5rem;
    border-radius: var(--radius-md);
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: var(--letter-spacing-wide);
    border: none;
    cursor: pointer;
    transition: 
      transform 280ms var(--ease-out), 
      box-shadow 280ms var(--ease-out), 
      background 280ms var(--ease-out), 
      opacity 280ms var(--ease-out);
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
    font-size: 0.875rem;
    color: white;
  }

  .btn-next,
  .btn-submit {
    background: linear-gradient(135deg, var(--brand-1) 0%, var(--brand-2) 100%);
    color: white;
    flex: 1;
    border: 2px solid transparent;
    position: relative;
  }
  
  /* Gold accent on primary buttons */
  .btn-next::before,
  .btn-submit::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, var(--accent-gold-light) 0%, var(--accent-gold-dark) 100%);
    border-radius: var(--radius-md);
    opacity: 0;
    transition: opacity 280ms var(--ease-out);
    z-index: -1;
  }

  .btn-next::after,
  .btn-submit::after {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(circle at 30% 20%, rgba(212, 175, 55, 0.2), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(255, 255, 255, 0.1), transparent 50%);
    pointer-events: none;
  }

  .btn-next:hover,
  .btn-submit:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(26, 41, 66, 0.3), var(--shadow-gold);
  }
  
  .btn-next:hover::before,
  .btn-submit:hover::before {
    opacity: 1;
  }

  .btn-next:active,
  .btn-submit:active {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(26, 41, 66, 0.25);
  }

  .btn-prev {
    background: white;
    color: var(--ink-light);
    border: 2px solid var(--stroke);
    font-weight: 600;
  }

  .btn-prev:hover {
    background: var(--surface-2);
    border-color: var(--accent-gold);
    color: var(--ink);
    transform: translateY(-2px);
    box-shadow: var(--shadow-sm);
  }

  .btn-prev:active {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .text-danger {
    color: var(--destructive);
    font-size: 0.875rem;
    margin-top: 0.5rem;
    font-weight: 500;
  }

  .form-text {
    color: var(--muted);
    font-size: 0.875rem;
    margin-top: 0.625rem;
    display: block;
    line-height: 1.5;
  }

  @media (prefers-reduced-motion: reduce) {
    .progress-bar-fill::after { animation: none; }
    .form-step.active, .form-step.leaving { animation: none; }
    .form-container, .question-block, .amenity-item, .btn { transition: none; }
    .amenity-item:has(input:checked)::after { animation: none; }
  }

  @media (max-width: 768px) {
    body {
      padding: 1.5rem 1rem;
    }

    .form-container {
      border-radius: var(--radius-lg);
    }

    .form-header {
      padding: 2rem 1.5rem 1.75rem;
    }

    .form-header h1 {
      font-size: 1.75rem;
    }

    .form-body {
      padding: 2rem 1.5rem;
    }

    .amenities-grid {
      grid-template-columns: 1fr;
    }

    .btn-group-nav {
      flex-direction: column-reverse;
      gap: 1rem;
    }
    
    .btn {
      width: 100%;
    }
  }
}

/**
 * Base typography. This is not applied to elements which have an ancestor with a Tailwind text class.
 */
@layer base {
  :where(:not(:has([class*=' text-']), :not(:has([class^='text-'])))) {
    h1 {
      font-size: var(--text-2xl);
      font-weight: var(--font-weight-medium);
      line-height: 1.3;
      letter-spacing: var(--letter-spacing-tight);
    }

    h2 {
      font-size: var(--text-xl);

<div class="form-container">
  <div class="form-header">
    <h1>REGISTER Establishment</h1>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="step-indicator" id="stepIndicator"></div>
  </div>

  <div class="form-body">
    <form method="post" action="{% url 'resorts:registerResort' %}" id="resortForm">
      {% csrf_token %}
      
      <div id="formStepsContainer"></div>

      <div class="btn-group-nav">
        <button type="button" class="btn btn-prev" id="prevBtn" onclick="changeStep(-1)" style="display: none;">Previous</button>
        <button type="button" class="btn-next" id="nextBtn" onclick="changeStep(1)">Next</button>
        <button type="submit" class="btn-submit" id="submitBtn" style="display: none;">Submit</button>
      </div>
    </form>
  </div>
</div>

<script>
  let currentStep = 0;
  let formSteps = [];

  function pad2(n) {
    return String(n).padStart(2, '0');
  }

  function formatTimeTo12h(timeValue) {
    // timeValue is usually "HH:MM" from <input type="time">
    if (!timeValue || typeof timeValue !== 'string' || !timeValue.includes(':')) return '';
    const [hhStr, mmStr] = timeValue.split(':');
    const hh = parseInt(hhStr, 10);
    const mm = parseInt(mmStr, 10);
    if (!Number.isFinite(hh) || !Number.isFinite(mm)) return '';
    const period = hh >= 12 ? 'PM' : 'AM';
    const hour12 = ((hh + 11) % 12) + 1;
    return `${hour12}:${pad2(mm)} ${period}`;
  }

  function buildOpenHoursText({ isClosed, is247, dayPattern, startTime, endTime }) {
    if (isClosed) return 'Temporarily closed';
    if (is247) return 'Open 24/7';
    const start = formatTimeTo12h(startTime);
    const end = formatTimeTo12h(endTime);
    if (!dayPattern || !start || !end) return '';
    return `${dayPattern} ${start} – ${end}`;
  }

  function initOpenHoursBuilder(questionBlock) {
    const rawInput = questionBlock.querySelector('#id_open_hours');
    if (!rawInput) return;

    const manualInput = questionBlock.querySelector('#openHoursManualInput');

    const builderToggle = questionBlock.querySelector('#openHoursUseBuilder');
    const builderPanel = questionBlock.querySelector('#openHoursBuilderPanel');
    const rawPanel = questionBlock.querySelector('#openHoursRawPanel');
    const preview = questionBlock.querySelector('#openHoursPreview');

    const closedEl = questionBlock.querySelector('#openHoursClosed');
    const is247El = questionBlock.querySelector('#openHours247');
    const dayPatternEl = questionBlock.querySelector('#openHoursDayPattern');
    const startEl = questionBlock.querySelector('#openHoursStart');
    const endEl = questionBlock.querySelector('#openHoursEnd');

    function setMode(useBuilder) {
      if (builderPanel) builderPanel.style.display = useBuilder ? 'block' : 'none';
      if (rawPanel) rawPanel.style.display = useBuilder ? 'none' : 'block';
      if (builderToggle) builderToggle.checked = useBuilder;
      if (manualInput) {
        manualInput.value = rawInput.value || '';
        manualInput.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }

    function syncFromBuilder() {
      const text = buildOpenHoursText({
        isClosed: !!(closedEl && closedEl.checked),
        is247: !!(is247El && is247El.checked),
        dayPattern: dayPatternEl ? dayPatternEl.value : '',
        startTime: startEl ? startEl.value : '',
        endTime: endEl ? endEl.value : '',
      });

      if (text) {
        rawInput.value = text;
        rawInput.dispatchEvent(new Event('input', { bubbles: true }));
        rawInput.dispatchEvent(new Event('change', { bubbles: true }));
      }

      if (preview) {
        preview.textContent = text ? `Preview: ${text}` : 'Preview: (fill options above)';
      }

      // Disable/enable fields depending on toggles
      const disableTime = !!(is247El && is247El.checked) || !!(closedEl && closedEl.checked);
      if (dayPatternEl) dayPatternEl.disabled = disableTime;
      if (startEl) startEl.disabled = disableTime;
      if (endEl) endEl.disabled = disableTime;
    }

    function defaultBuilderIfEmpty() {
      const hasText = String(rawInput.value || '').trim().length > 0;
      setMode(!hasText);
      syncFromBuilder();
    }

    if (manualInput) {
      manualInput.addEventListener('input', () => {
        rawInput.value = manualInput.value;
        rawInput.dispatchEvent(new Event('input', { bubbles: true }));
        rawInput.dispatchEvent(new Event('change', { bubbles: true }));
        if (preview) {
          const t = String(manualInput.value || '').trim();
          preview.textContent = t ? `Preview: ${t}` : 'Preview: (type open hours)';
        }
      });
    }

    if (builderToggle) {
      builderToggle.addEventListener('change', () => {
        setMode(builderToggle.checked);
        if (builderToggle.checked) syncFromBuilder();
      });
    }

    [closedEl, is247El, dayPatternEl, startEl, endEl].forEach((el) => {
      if (!el) return;
      el.addEventListener('change', syncFromBuilder);
      el.addEventListener('input', syncFromBuilder);
    });

    defaultBuilderIfEmpty();
  }

  function initializeForm() {
    const formFields = [];
    const amenityFields = [];
    const paymentFields = [];

    {% for field in RESORTFORM %}
      {% if 'accepts_' in field.name %}
        paymentFields.push({
          name: '{{ field.name }}',
          label: '{{ field.label }}',
          html: `{{ field|safe }}`
        });
      {% elif 'has_' in field.name or 'pet_friendly' in field.name or 'family_friendly' in field.name %}
        amenityFields.push({
          name: '{{ field.name }}',
          label: '{{ field.label }}',
          html: `{{ field|safe }}`
        });
      {% else %}
        formFields.push({
          name: '{{ field.name }}',
          label: '{{ field.label }}',
          html: `{{ field|safe }}`,
          helpText: '{{ field.help_text|safe }}',
          errors: '{{ field.errors|safe }}'
        });
      {% endif %}
    {% endfor %}

    // Ensure latitude + longitude are always on the same step
    let latField = null;
    let lngField = null;
    const remainingFields = [];
    formFields.forEach((f) => {
      if (!f) return;
      if (f.name === 'latitude') {
        latField = f;
        return;
      }
      if (f.name === 'longitude') {
        lngField = f;
        return;
      }
      remainingFields.push(f);
    });

    // Create steps with 2 questions each (from remaining fields)
    for (let i = 0; i < remainingFields.length; i += 2) {
      const stepFields = remainingFields.slice(i, i + 2);
      formSteps.push({ type: 'fields', fields: stepFields });
    }

    // Add coordinates step (lat/lng) as its own step
    if (latField && lngField) {
      formSteps.push({ type: 'fields', fields: [latField, lngField] });
    } else {
      // If only one exists for some reason, keep it in the normal flow
      if (latField) formSteps.push({ type: 'fields', fields: [latField] });
      if (lngField) formSteps.push({ type: 'fields', fields: [lngField] });
    }

    // Add amenities as penultimate step
    if (amenityFields.length > 0) {
      formSteps.push({ type: 'amenities', fields: amenityFields });
    }

    // Add payment methods as final step
    if (paymentFields.length > 0) {
      formSteps.push({ type: 'payments', fields: paymentFields });
    }

    renderSteps();
    showStep(0);
  }

  function renderSteps() {
    const container = document.getElementById('formStepsContainer');
    container.innerHTML = '';

    formSteps.forEach((step, index) => {
      const stepDiv = document.createElement('div');
      stepDiv.className = 'form-step';
      stepDiv.setAttribute('data-step', index);

      if (step.type === 'fields') {
        const hasLatitude = step.fields.some(f => f && f.name === 'latitude');
        const hasLongitude = step.fields.some(f => f && f.name === 'longitude');

        step.fields.forEach(field => {
          const questionBlock = document.createElement('div');
          questionBlock.className = 'question-block';
          if (field.name === 'open_hours') {
            questionBlock.innerHTML = `
              <label>${field.label}</label>
              <div class="d-flex gap-2 flex-wrap align-items-center" style="margin-bottom: 0.5rem;">
                <div class="form-check" style="margin: 0;">
                  <input class="form-check-input" type="checkbox" id="openHoursUseBuilder" checked>
                  <label class="form-check-label" for="openHoursUseBuilder" style="display: inline; font-weight: 600;">Quick builder</label>
                </div>
                <small class="form-text" style="margin: 0;">Generates a clean text like “Mon–Sun 8:00 AM – 9:00 PM”.</small>
              </div>

              <div id="openHoursBuilderPanel">
                <div class="d-flex gap-3 flex-wrap">
                  <div class="form-check" style="margin: 0;">
                    <input class="form-check-input" type="checkbox" id="openHours247">
                    <label class="form-check-label" for="openHours247" style="display: inline; font-weight: 500;">Open 24/7</label>
                  </div>
                  <div class="form-check" style="margin: 0;">
                    <input class="form-check-input" type="checkbox" id="openHoursClosed">
                    <label class="form-check-label" for="openHoursClosed" style="display: inline; font-weight: 500;">Temporarily closed</label>
                  </div>
                </div>

                <div class="d-flex gap-2 flex-wrap" style="margin-top: 0.75rem;">
                  <select class="form-select" id="openHoursDayPattern" style="max-width: 260px;">
                    <option value="Mon–Sun">Mon–Sun (daily)</option>
                    <option value="Mon–Fri">Mon–Fri</option>
                    <option value="Mon–Sat">Mon–Sat</option>
                    <option value="Sat–Sun">Sat–Sun (weekends)</option>
                  </select>
                  <input type="time" class="form-control" id="openHoursStart" style="max-width: 170px;" value="08:00">
                  <input type="time" class="form-control" id="openHoursEnd" style="max-width: 170px;" value="21:00">
                </div>

                <small class="form-text" id="openHoursPreview" style="margin-top: 0.5rem;">Preview: (fill options above)</small>
              </div>

              <div id="openHoursRawPanel" style="display:none;">
                <input type="text" class="form-control" id="openHoursManualInput" placeholder="Mon–Sun 8:00 AM – 9:00 PM">
                ${field.helpText ? `<small class="form-text">${field.helpText}</small>` : ''}
                <small class="form-text">Tip: You can type “Daily 8am–9pm” or “Mon–Fri 9–5, Sat 9–12”.</small>
              </div>

              <!-- Always keep the real form field present for submission -->
              <div style="display:none;">${field.html}</div>
              ${field.errors ? `<div class="text-danger">${field.errors}</div>` : ''}
            `;
          } else {
            questionBlock.innerHTML = `
              <label>${field.label}</label>
              ${field.html}
              ${field.helpText ? `<small class="form-text">${field.helpText}</small>` : ''}
              ${field.errors ? `<div class="text-danger">${field.errors}</div>` : ''}
            `;
          }
          stepDiv.appendChild(questionBlock);

          if (field.name === 'open_hours') {
            setTimeout(() => initOpenHoursBuilder(questionBlock), 0);
          }
        });

        // If this step contains both latitude and longitude, add a helper button.
        if (hasLatitude && hasLongitude) {
          const geoBlock = document.createElement('div');
          geoBlock.className = 'question-block';
          geoBlock.innerHTML = `
            <label>Location</label>
            <div class="d-flex gap-2 flex-wrap align-items-center">
              <button type="button" class="btn btn-prev" id="useGeolocationBtn" style="padding: 0.6rem 1rem;">Use my current location</button>
              <a href="#" class="link-primary" id="confirmLocationLink">Confirm location</a>
              <a href="#" class="link-primary disabled" aria-disabled="true" id="openGoogleMapsLink" target="_blank" rel="noopener noreferrer">Open Google Maps</a>
              <small class="form-text" style="margin-top: 0;" id="geoStatus"></small>
            </div>
            <small class="form-text">This uses your browser's location permission and may be less accurate indoors.</small>
          `;
          stepDiv.appendChild(geoBlock);

          // Wire up after insertion
          setTimeout(() => {
            const btn = document.getElementById('useGeolocationBtn');
            if (btn) btn.addEventListener('click', fillFromGeolocation);

            const confirmLink = document.getElementById('confirmLocationLink');
            if (confirmLink) {
              confirmLink.addEventListener('click', (e) => {
                e.preventDefault();
                confirmLocation();
              });
            }

            const latEl = document.getElementById('id_latitude');
            const lngEl = document.getElementById('id_longitude');
            if (latEl) latEl.addEventListener('input', updateGoogleMapsLink);
            if (lngEl) lngEl.addEventListener('input', updateGoogleMapsLink);

            updateGoogleMapsLink();
          }, 0);
        }
      } else if (step.type === 'amenities') {
        const amenitiesSection = document.createElement('div');
        amenitiesSection.className = 'question-block';
        amenitiesSection.innerHTML = '<label style="font-size: 1.3rem; text-align: center; margin-bottom: 1.5rem;">🏖️ Establishment Amenities & Features</label>';
        
        const amenitiesGrid = document.createElement('div');
        amenitiesGrid.className = 'amenities-grid';
        
        step.fields.forEach(field => {
          // Extract input from field.html, ignore any label in field.html
          const parser = document.createElement('div');
          parser.innerHTML = field.html;
          const input = parser.querySelector('input');
          if (input) {
            // Remove input from parser so we don't duplicate
            parser.removeChild(input);
          }
          const amenityDiv = document.createElement('div');
          amenityDiv.className = 'amenity-item';
          amenityDiv.innerHTML = `
            <label style="display: flex; align-items: center; gap: 0.75rem; width: 100%; cursor: pointer; margin: 0;">
              ${input ? input.outerHTML : ''}
              <span>${field.label}</span>
            </label>
          `;
          amenitiesGrid.appendChild(amenityDiv);
        });
        
        amenitiesSection.appendChild(amenitiesGrid);
        stepDiv.appendChild(amenitiesSection);
      } else if (step.type === 'payments') {
        const paymentsSection = document.createElement('div');
        paymentsSection.className = 'question-block';
        paymentsSection.innerHTML = '<label style="font-size: 1.3rem; text-align: center; margin-bottom: 1.5rem;">💳 Payment Methods Accepted</label>';
        
        const paymentsGrid = document.createElement('div');
        paymentsGrid.className = 'amenities-grid';
        
        step.fields.forEach(field => {
          const paymentDiv = document.createElement('div');
          paymentDiv.className = 'amenity-item';
          paymentDiv.innerHTML = `
            ${field.html}
            <label>${field.label}</label>
          `;
          
          paymentsGrid.appendChild(paymentDiv);
        });
        
        paymentsSection.appendChild(paymentsGrid);
        stepDiv.appendChild(paymentsSection);
      }

      container.appendChild(stepDiv);
    });
  }

  function showStep(step, fromStep = null) {
    const steps = document.querySelectorAll('.form-step');

    const prevStep = typeof fromStep === 'number' ? fromStep : step;

    // Animate previous step out (if any)
    const prevEl = steps[prevStep];
    if (prevEl && prevStep !== step) {
      prevEl.classList.remove('active');
      prevEl.classList.add('leaving');
      setTimeout(() => {
        prevEl.classList.remove('leaving');
        // Keep it hidden once it has animated out
        prevEl.style.display = 'none';
      }, 280);
    }

    // Hide all non-target steps immediately (except leaving)
    steps.forEach((stepEl, index) => {
      if (index !== step && index !== prevStep) {
        stepEl.classList.remove('active', 'leaving');
        stepEl.style.display = 'none';
      }
    });

    // Animate target step in
    const nextEl = steps[step];
    if (nextEl) {
      nextEl.style.display = 'block';
      nextEl.classList.remove('leaving');
      setTimeout(() => {
        nextEl.classList.add('active');
      }, 30);
    }

    // Update buttons
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitBtn');

    prevBtn.style.display = step === 0 ? 'none' : 'block';
    
    if (step === formSteps.length - 1) {
      nextBtn.style.display = 'none';
      submitBtn.style.display = 'block';
    } else {
      nextBtn.style.display = 'block';
      submitBtn.style.display = 'none';
    }

    // Update progress bar
    const progress = ((step + 1) / formSteps.length) * 100;
    document.getElementById('progressBar').style.width = progress + '%';

    // Update "Step X of Y" indicator
    const stepIndicator = document.getElementById('stepIndicator');
    if (stepIndicator) {
      stepIndicator.textContent = `Step ${step + 1} of ${formSteps.length}`;
    }

    // Gentle nudge back to top of the card on step change
    const container = document.querySelector('.form-container');
    if (container) {
      container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function changeStep(direction) {
    const newStep = currentStep + direction;
    
    if (newStep >= 0 && newStep < formSteps.length) {
      const prev = currentStep;
      currentStep = newStep;
      showStep(currentStep, prev);
    }
  }

  function setInputValueById(id, value) {
    const input = document.getElementById(id);
    if (!input) return false;
    input.value = value;
    // Trigger events in case there are listeners/validation
    input.dispatchEvent(new Event('input', { bubbles: true }));
    input.dispatchEvent(new Event('change', { bubbles: true }));
    return true;
  }

  function setGeoStatus(message, isError = false) {
    const statusEl = document.getElementById('geoStatus');
    if (!statusEl) return;
    statusEl.textContent = message || '';
    statusEl.style.color = isError ? '#e53e3e' : '#718096';
  }

  function getLatLngFromInputs() {
    const latEl = document.getElementById('id_latitude');
    const lngEl = document.getElementById('id_longitude');
    if (!latEl || !lngEl) return null;

    const lat = parseFloat(String(latEl.value).trim());
    const lng = parseFloat(String(lngEl.value).trim());
    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;

    return { lat, lng };
  }

  function updateGoogleMapsLink() {
    const link = document.getElementById('openGoogleMapsLink');
    if (!link) return;

    const coords = getLatLngFromInputs();
    if (!coords) {
      link.href = '#';
      link.classList.add('disabled');
      link.setAttribute('aria-disabled', 'true');
      return;
    }

    const { lat, lng } = coords;
    link.href = `https://www.google.com/maps?q=${encodeURIComponent(lat + ',' + lng)}`;
    link.classList.remove('disabled');
    link.setAttribute('aria-disabled', 'false');
  }

  function confirmLocation() {
    const coords = getLatLngFromInputs();
    if (!coords) {
      setGeoStatus('Enter valid latitude and longitude first.', true);
      updateGoogleMapsLink();
      return;
    }

    const { lat, lng } = coords;
    updateGoogleMapsLink();
    setGeoStatus(`Location confirmed: ${lat.toFixed(6)}, ${lng.toFixed(6)}`);
  }

  function fillFromGeolocation() {
    const btn = document.getElementById('useGeolocationBtn');
    if (!navigator.geolocation) {
      setGeoStatus('Geolocation is not supported in this browser.', true);
      return;
    }

    if (btn) btn.disabled = true;
    setGeoStatus('Requesting current location…');

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const latOk = setInputValueById('id_latitude', lat);
        const lngOk = setInputValueById('id_longitude', lng);

        if (latOk && lngOk) {
          setGeoStatus('Location filled. You can fine-tune if needed.');
        } else {
          setGeoStatus('Could not find latitude/longitude inputs on the page.', true);
        }

        updateGoogleMapsLink();

        if (btn) btn.disabled = false;
      },
      (err) => {
        let msg = 'Unable to get your location.';
        if (err && typeof err.code === 'number') {
          if (err.code === 1) msg = 'Permission denied. Please allow location access and try again.';
          if (err.code === 2) msg = 'Location unavailable. Try again outdoors or with better signal.';
          if (err.code === 3) msg = 'Location request timed out. Please try again.';
        }
        setGeoStatus(msg, true);
        if (btn) btn.disabled = false;
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );
  }

  // Initialize when DOM is ready
  document.addEventListener('DOMContentLoaded', function() {
    initializeForm();
  });
</script>
