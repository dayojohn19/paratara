{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- External Libraries -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.0/dist/fancybox/fancybox.css" />
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.0/dist/fancybox/fancybox.umd.js"></script>
  <script defer type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <title>{% block title %}{% endblock %}</title>
  {% block head_meta %}{% endblock %}
  <style>
    :root {
      --page-bg: linear-gradient(145deg, #f6f7ff 0%, #eef3ff 40%, #ffffff 100%);
      --surface-solid: #ffffff;
      --surface-soft: rgba(255, 255, 255, 0.75);
      --surface-glass: rgba(255, 255, 255, 0.6);
      --ink-900: #0b1120;
      --ink-700: #1e293b;
      --ink-500: #475569;
      --ink-300: #94a3b8;
      --brand-500: #2563eb;
      --brand-600: #1d4ed8;
      --brand-100: #dbe8ff;
      --accent-500: #f97316;
      --success-500: #16a34a;
      --danger-500: #dc2626;
      --border-soft: rgba(37, 99, 235, 0.08);
      --border-strong: rgba(15, 23, 42, 0.12);
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --shadow-soft: 0 24px 60px -35px rgba(15, 23, 42, 0.45);
      --shadow-float: 0 18px 40px -25px rgba(37, 99, 235, 0.45);
      --shadow-tight: 0 12px 30px -18px rgba(15, 23, 42, 0.38);
      --transition: all 0.26s ease;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: var(--ink-700);
      line-height: 1.7;
      background: var(--page-bg);
      min-height: 100vh;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 2.5rem 4.5rem;
      position: relative;
    }

    @media (max-width: 1024px) {
      .container {
        padding: 0 1.75rem 4rem;
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 0 1.25rem 3rem;
      }
    }

    .header {
      position: relative;
      min-height: 360px;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 3.5rem 1.5rem 2.5rem;
      margin-bottom: 2.75rem;

      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(11, 17, 32, 0.1) 10%, rgba(11, 17, 32, 0.8) 95%);
    }

    .header-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1180px;
      color: #f8fafc;
      display: grid;
      gap: 1.75rem;
    }

    @media (min-width: 900px) {
      .header-wrap {
        grid-template-columns: 7fr 5fr;
        align-items: end;
      }
    }

    .header-title {
      font-size: clamp(2.6rem, 4vw, 3.4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 0.65rem;
      text-shadow: 0 22px 45px rgba(5, 8, 18, 0.55);
    }

    .header-lead {
      font-size: 1.05rem;
      color: rgba(226, 232, 240, 0.78);
      max-width: 560px;
      line-height: 1.75;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.1rem;
      flex-wrap: wrap;
    }

    .header-sub {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.24);
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      backdrop-filter: blur(18px);
      transition: var(--transition);
    }

    .badge:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px -20px rgba(255, 255, 255, 0.8);
    }

    .summary-ribbon {
      display: grid;
      gap: 0.75rem;
    }

    .summary-card {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      padding: 1.25rem 1.5rem;
      border-radius: var(--radius-lg);
      background: rgba(8, 12, 24, 0.55);
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: var(--shadow-tight);
      backdrop-filter: blur(20px);
    }

    .summary-card span {
      font-size: 0.92rem;
      color: rgba(226, 232, 240, 0.85);
    }

    .summary-card strong {
      font-size: 1.55rem;
      letter-spacing: -0.03em;
    }

    .summary-card small {
      font-size: 0.82rem;
      color: rgba(226, 232, 240, 0.6);
    }

    .toolbar {
      position: sticky;
      top: 22px;
      z-index: 30;
      margin: -48px auto 3rem;
      width: min(1180px, calc(100% - 2.5rem));
      backdrop-filter: blur(18px);
      background: var(--surface-glass);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(37, 99, 235, 0.14);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .toolbar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.4rem;
      color: var(--ink-500);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.35rem;
    }

    .hamburger span {
      width: 24px;
      height: 3px;
      border-radius: 999px;
      background: var(--ink-700);
      transition: var(--transition);
    }

    .hamburger.active span:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
    }

    .toolbar-inner {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.6rem;
      padding: 0 1.25rem 1.15rem;
    }

    .tool {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-700);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border-soft);
      box-shadow: 0 6px 16px -14px rgba(15, 23, 42, 0.6);
      transition: var(--transition);
    }

    .tool:hover {
      transform: translateY(-3px);
      border-color: rgba(37, 99, 235, 0.3);
      box-shadow: var(--shadow-float);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 600;
      border: 1px solid rgba(99, 102, 241, 0.22);
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.16), rgba(14, 165, 233, 0.18));
      color: var(--brand-600);
      cursor: pointer;
      transition: var(--transition);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-float);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--brand-500), var(--accent-500));
      color: #f8fafc;
      border: none;
      box-shadow: 0 18px 40px -18px rgba(37, 99, 235, 0.75);
    }

    .btn.primary:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 22px 45px -16px rgba(14, 165, 233, 0.6);
    }

    .btn.warn {
      background: linear-gradient(135deg, rgba(220, 38, 38, 0.14), rgba(248, 113, 113, 0.18));
      color: var(--danger-500);
      border-color: rgba(248, 113, 113, 0.32);
    }

    .btn.warn:hover {
      box-shadow: 0 18px 35px -18px rgba(220, 38, 38, 0.45);
    }

    .section {
      position: relative;
      margin-bottom: 4rem;
    }

    .section-head {
      margin-bottom: 1.75rem;
      display: grid;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1.5rem;
    }

    .section-title {
      font-size: clamp(1.4rem, 2.2vw, 1.85rem);
      font-weight: 700;
      color: var(--ink-900);
      letter-spacing: -0.02em;
    }

    .section-sub {
      font-size: 0.95rem;
      color: var(--ink-500);
    }

    .grid {
      display: grid;
      gap: 1.6rem;
      grid-template-columns: repeat(auto-fit, minmax(295px, 1fr));
    }

    .tool-grid {
      /* display: grid; */
      /* gap: 1.4rem; */
      /* grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); */
    }

    /* .card {
      background: var(--surface-solid);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      transition: var(--transition);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 60px -34px rgba(37, 99, 235, 0.45);
    } */

    .tool-card {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 1rem;
      align-items: start;
      padding: 1.6rem 1.8rem;
    }

    .tool-card .card-body {
      padding: 0;
    }

    .tool-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(37, 99, 235, 0.1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 14px 26px -20px rgba(37, 99, 235, 0.6);
    }

    .tool-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink-700);
    }

    .tool-copy {
      font-size: 0.93rem;
      color: var(--ink-500);
    }

    .tool-status {
      font-size: 0.85rem;
      color: var(--ink-500);
    }

    .stacked-form {
      display: grid;
      gap: 0.75rem;
    }

    .package-card {
      display: grid;
      gap: 1.5rem;
    }

    .package-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.75rem 1.75rem 0 1.75rem;
    }

    .package-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--ink-300);
      margin-bottom: 0.45rem;
    }

    .package-title {
      font-size: clamp(1.35rem, 2vw, 1.65rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink-900);
    }

    .package-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    .package-body {
      padding: 0 1.75rem 0;
    }

    .package-form {
      background: rgba(248, 250, 255, 0.9);
      border: 1px dashed rgba(37, 99, 235, 0.35);
      border-radius: var(--radius-md);
      padding: 1.4rem;
      display: grid;
      gap: 1rem;
      box-shadow: 0 12px 30px -24px rgba(37, 99, 235, 0.5);
    }

    .package-items {
      padding: 0 1.75rem 1.75rem;
    }

    .promo-card {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* Responsive: two promo-cards per row on mobile */
    @media (max-width: 640px) {
      .promo-card {
        min-width: 0;
      }
    }

    .package-item-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--ink-700);
    }

    .package-item-sub {
      color: var(--ink-500);
      font-size: 0.95rem;
    }

    .manager-stack {
      display: none;
      gap: 0.65rem;
      margin-top: 0.8rem;
    }

    .manager-stack form {
      display: grid;
      gap: 0.6rem;
    }

    .empty-hint {
      padding: 2.5rem;
      text-align: center;
      color: var(--ink-500);
      background: rgba(248, 250, 255, 0.9);
      border-radius: var(--radius-md);
      border: 1px dashed rgba(148, 163, 184, 0.35);
    }

    .card-body {
      padding: 1.6rem;

    }

    .card-body > * + * {
      margin-top: 0;
    }

    .meta-grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .meta-panel {
      display: grid;
      gap: 0.75rem;
      padding: 1.1rem 1.25rem;
      border-radius: var(--radius-md);
      background: rgba(248, 250, 255, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: 0 18px 40px -32px rgba(15, 23, 42, 0.4);
    }

    .meta-title {
      font-weight: 700;
      color: var(--ink-700);
      letter-spacing: -0.01em;
    }

    .meta-text {
      color: var(--ink-500);
      font-size: 0.97rem;
    }

    .meta-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .meta-tag {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.12);
      color: var(--brand-600);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .meta-rows {
      display: grid;
      gap: 0.65rem;
      font-size: 0.95rem;
      color: var(--ink-500);
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      word-break: break-word;
    }

    .meta-row a {
      color: var(--brand-600);
      font-weight: 600;
    }

    .meta-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 0.35rem;
    }

    .meta-bullets {
      list-style: none;
      display: grid;
      gap: 0.45rem;
      font-size: 0.93rem;
      color: var(--ink-500);
    }

    .meta-bullets li::before {
      content: '•';
      color: var(--brand-600);
      margin-right: 0.45rem;
    }

    .meta-hint {
      font-size: 0.8rem;
      color: var(--ink-300);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .img-cover {
      width: 100%;
      height: 230px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    }

    .price {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--brand-600);
      letter-spacing: -0.01em;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    input[type="text"],
    input:not([type]),
    input[type="email"],
    input[type="number"],
    input[type="url"],
    input[type="tel"],
    input[type="search"],
    input[type="password"],
    input[type="date"],
    input[type="datetime-local"],
    input[type="time"],
    input[type="month"],
    input[type="week"],
    input[type="file"],
    textarea,
    select {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(37, 99, 235, 0.14);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(226, 232, 240, 0.6));
      padding: 0.78rem 1rem;
      font-size: 0.95rem;
      color: var(--ink-700);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6), 0 16px 28px -24px rgba(15, 23, 42, 0.55);
      transition: var(--transition);
    }

    input[type="text"],
    input:not([type]),
    input[type="email"],
    input[type="number"],
    input[type="url"],
    input[type="tel"],
    input[type="search"],
    input[type="password"],
    textarea {
      appearance: none;
    }

    input[type="file"] {
      font-size: 0.9rem;
      cursor: pointer;
    }

    input[type="file"]::file-selector-button {
      margin-right: 0.75rem;
      padding: 0.55rem 0.95rem;
      border-radius: 999px;
      border: 1px solid rgba(37, 99, 235, 0.18);
      background: rgba(37, 99, 235, 0.08);
      color: var(--brand-600);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    input[type="file"]::file-selector-button:hover {
      background: rgba(37, 99, 235, 0.14);
    }

    select {
      appearance: none;
      background-image: url('data:image/svg+xml;charset=UTF-8,%3Csvg width="16" height="10" viewBox="0 0 16 10" fill="none" xmlns="http://www.w3.org/2000/svg"%3E%3Cpath d="M2 2.5L8 7.5L14 2.5" stroke="%232563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/%3E%3C/svg%3E');
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 14px;
      padding-right: 2.75rem;
    }

    input:hover,
    textarea:hover,
    select:hover {
      border-color: rgba(37, 99, 235, 0.28);
      background: rgba(255, 255, 255, 0.98);
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.16), 0 18px 38px -26px rgba(37, 99, 235, 0.45);
      background: #ffffff;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(71, 85, 105, 0.65);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink-500);
    }

    .form-row {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-bottom: 1rem;
    }

    .form-row > div {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .amenities-grid {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .amenities-grid label {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-weight: 500;
      font-size: 0.92rem;
      color: var(--ink-500);
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.18);
      padding: 0.55rem 0.75rem;
      border-radius: var(--radius-sm);
    }

    .gallery-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .gallery-image {
      width: 100%;
      height: 210px;
      object-fit: cover;
      border-radius: var(--radius-md);
      transition: var(--transition);
      box-shadow: var(--shadow-tight);
    }

    .gallery-image:hover {
      transform: scale(1.02);
      box-shadow: var(--shadow-float);
    }

    .gallery-card {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .gallery-delete {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 0.78rem;
      padding: 0.4rem 0.9rem;
      z-index: 2;
    }

    .gallery-actions {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .iframe-container {
      position: relative;
      min-height: 520px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: rgba(15, 23, 42, 0.04);
      display: none;
    }

    .calendar-frame {
      width: 100vw;
      height: 100vh;
      border: none;
      display: none;
    }

    .iframe-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: 4px solid rgba(37, 99, 235, 0.15);
      border-top-color: rgba(37, 99, 235, 0.65);
      transform: translate(-50%, -50%);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    #ocrFileList > div {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(37, 99, 235, 0.2);
      border-radius: var(--radius-lg);
      padding: 1.1rem;
      box-shadow: var(--shadow-tight);
    }

    progress {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
    }

    progress::-webkit-progress-bar {
      background: rgba(148, 163, 184, 0.22);
    }

    progress::-webkit-progress-value {
      background: linear-gradient(135deg, var(--brand-500), var(--accent-500));
    }

    progress::-moz-progress-bar {
      background: linear-gradient(135deg, var(--brand-500), var(--accent-500));
    }

    footer {
      margin-top: 4rem;
      padding: 2.5rem 0 3rem;
      text-align: center;
      color: var(--ink-500);
      font-size: 0.92rem;
    }

    footer > div + div {
      margin-top: 0.45rem;
    }

    @media (max-width: 900px) {
      .toolbar {
        width: calc(100% - 2.5rem);
        margin: -36px auto 2.75rem;
      }

      .hamburger {
