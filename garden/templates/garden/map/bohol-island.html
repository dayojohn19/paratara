<!doctype html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'self' http://localhost:*">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ placeName|title }} — Animated Interactive Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
      .image-desc {
          max-width:200px;
          max-height:200px;
          border-radius: 8px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      .leaflet-popup-content {
          text-align: center;
          overflow: hidden;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
    html,body {height:100%;margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);}
    #map {height:100vh; width:100%; border-radius: 10px; box-shadow: inset 0 0 20px rgba(0,0,0,0.1);}
    .sidebar {
      position: absolute; bottom: 80px; left: 40px; z-index: 9999; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding:20px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.15); max-width:300px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
      opacity: 1;

    }
    .sidebar.closed {
      transform: translateX(-480px);
      opacity: 0;
      z-index: 9999;
    }
    .toggle-btn {
      position:absolute; bottom:60px; left:30px; z-index:500; background: linear-gradient(45deg, #007bff, #0056b3); color:#fff; border:none; padding:12px 16px; border-radius:50px; cursor:pointer; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; box-shadow: 0 4px 15px rgba(0,123,255,0.3);
      transition: all 0.3s ease;
    }
    .toggle-btn:hover{background: linear-gradient(45deg, #0056b3, #004085); transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,123,255,0.4);}
    .place {cursor:pointer;padding:10px 12px;border-radius:8px;margin-bottom:8px; transition: background 0.2s ease, transform 0.2s ease; font-weight: 500;}
    .place:hover{background: linear-gradient(90deg, #f8f9fa, #e9ecef); transform: translateX(5px); box-shadow: 0 2px 5px rgba(0,0,0,0.1);}

    #places {
        max-height: 300px;
        overflow-y: auto;
        background-color: rgba(233,236,239,0.8);
        border-radius: 8px;
        padding: 10px;
        scrollbar-width: thin;
        scrollbar-color: #007bff rgba(233,236,239,0.5);
    }
    #places::-webkit-scrollbar {
      width: 6px;
    }
    #places::-webkit-scrollbar-track {
      background: rgba(233,236,239,0.5);
      border-radius: 3px;
    }
    #places::-webkit-scrollbar-thumb {
      background: #007bff;
      border-radius: 3px;
    }

    .controls {display:flex; gap:8px; margin-top:12px; flex-wrap: wrap;}
    .btn{border:0;padding:10px 14px;border-radius:8px;cursor:pointer;background: linear-gradient(45deg, #28a745, #20c997);color:white; font-weight: bold; transition: all 0.3s ease; box-shadow: 0 2px 10px rgba(40,167,69,0.3);}
    .btn.secondary{background: linear-gradient(45deg, #6c757d, #5a6268);}
    .btn:hover {transform: translateY(-2px); box-shadow: 0 4px 15px rgba(40,167,69,0.4);}
    .btn.secondary:hover {box-shadow: 0 4px 15px rgba(108,117,125,0.4);}

    .attribution {font-size:11px;opacity:0.8;margin-top:8px; color: #6c757d;}

    /* Responsive design */
    @media (max-width: 768px) {
      .sidebar {
        left: 10px;
        bottom: 60px;
        max-width: calc(100vw - 20px);
        padding: 15px;
      }
      .sidebar.closed {
        transform: translateX(-100vw);
      }
      .toggle-btn {
        left: 10px;
        bottom: 40px;
        padding: 10px 14px;
      }
      #places {
        max-height: 200px;
      }
      .place {
        padding: 8px 10px;
        font-size: 14px;
      }
      .controls {
        gap: 6px;
      }
      .btn {
        padding: 8px 12px;
        font-size: 14px;
      }
    }

    /* Accessibility improvements */
    .toggle-btn:focus, .btn:focus, .place:focus {
      outline: 2px solid #007bff;
      outline-offset: 2px;
    }

    /* Loading animation for map */
    #map {
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Surf spot highlight (pulsing) */
    .surf-marker {
      position: relative;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #1e90ff;
      box-shadow: 0 0 6px rgba(30,144,255,0.8);
    }
    .surf-marker.recommended::after,
    .surf-marker.best::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 0 rgba(30,144,255,0.45);
      animation: surfPulse 1.6s ease-out infinite;
    }
    @keyframes surfPulse {
      0% { box-shadow: 0 0 0 0 rgba(30,144,255,0.45); opacity: 1; }
      100% { box-shadow: 0 0 0 18px rgba(30,144,255,0); opacity: 0; }
    }
  </style>
</head>
<body>
    <button id="toggleSidebar" class="toggle-btn">☰ Check Destinations</button>
    <div class="sidebar closed" id="sidebar">
    <h2><strong>Destinations</strong></h2>
    <div id="places">
    </div>

    <div class="controls">
      <button id="flyAll" class="btn">View to All</button>
      <!-- <a id="carpool-btn" href="https://paratara.com" class="btn">Carpool</a> -->
      <!-- <button id="toggleAnim" class="btn secondary">Pause Boat</button> -->
    </div>

    
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    function closeQuickPlaces(){
      toggleBtn = document.getElementById('toggleSidebar');
      sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('closed');
      toggleBtn.textContent = sidebar.classList.contains('closed') ? '☰ Open' : '✖ Close';
    }


    toggleBtn = document.getElementById('toggleSidebar');
    toggleBtn.addEventListener('click', ()=>{
      closeQuickPlaces()
    });

    const center = {{ center|safe }};
    const map = L.map('map', {zoomControl:true}).setView(center, 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);

    // ---- Wind + Tide (optional) -------------------------------------------------
    // Wind: Open-Meteo (free, no key) https://open-meteo.com/
    // Tide extremes: Stormglass (requires key) https://stormglass.io/
    // Provide a key via Django context as `stormglass_api_key` (recommended), else it will show wind only.
    // const STORMGLASS_API_KEY = "{{ stormglass_api_key|default:'' }}";
    const STORMGLASS_API_KEY = "e0b1f69a-ead6-11f0-a0d3-0242ac130003-e0b1f6fe-ead6-11f0-a0d3-0242ac130003";

    // Cache Stormglass tide results in localStorage to reduce API calls.
    // Refresh interval: 6 hours.
    const STORMGLASS_CACHE_MAX_AGE_MS = 6 * 60 * 60 * 1000;
    function stormglassCacheKey(lat, lng) {
      // Round to reduce unique keys from tiny coordinate differences.
      const latKey = Number(lat).toFixed(4);
      const lngKey = Number(lng).toFixed(4);
      return `stormglass:tideExtremes:${latKey},${lngKey}`;
    }

    function readStormglassCache(lat, lng) {
      try {
        const key = stormglassCacheKey(lat, lng);
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        if (typeof parsed.fetchedAt !== 'number') return null;
        if (!Array.isArray(parsed.data)) return null;
        const age = Date.now() - parsed.fetchedAt;
        if (age < 0 || age > STORMGLASS_CACHE_MAX_AGE_MS) return null;
        return { data: parsed.data, fetchedAt: parsed.fetchedAt };
      } catch {
        return null;
      }
    }

    function writeStormglassCache(lat, lng, data, fetchedAtMs) {
      try {
        const key = stormglassCacheKey(lat, lng);
        const payload = {
          fetchedAt: typeof fetchedAtMs === 'number' ? fetchedAtMs : Date.now(),
          data: Array.isArray(data) ? data : [],
        };
        localStorage.setItem(key, JSON.stringify(payload));
      } catch {
        // Ignore storage quota / privacy mode errors.
      }
    }

    const windTideControl = L.control({ position: 'bottomright' });
    windTideControl.onAdd = function () {
      const container = L.DomUtil.create('div', '');
      container.style.padding = '10px 12px';
      container.style.background = 'rgba(255,255,255,0.95)';
      container.style.borderRadius = '10px';
      container.style.boxShadow = '0 4px 20px rgba(0,0,0,0.15)';
      container.style.fontSize = '12px';
      container.style.lineHeight = '1.25';
      container.style.maxWidth = '240px';
      container.style.fontFamily = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
      container.innerHTML = `
        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
          Best Surf Spot -->
          <button id="wt-toggle" type="button" aria-label="Minimize Wind/Tide" style="border:0; background:rgba(0,0,0,0.06); padding:4px 8px; border-radius:8px; cursor:pointer; font-weight:700; line-height:1;">
             ▾
            </button>
        </div>
        <div id="wt-status" style="opacity:0.85; margin-top:6px;">Loading…</div>
        <div id="wt-details">
          <div id="wt-updated" style="opacity:0.75; margin-top:4px; display:none;"></div>
          <div id="wt-wind" style="display:none; margin-top:8px;">
          <div style="display:flex; align-items:center; gap:10px;">
            <div id="wt-arrow" aria-label="Wind direction" style="width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:18px; background:rgba(0,0,0,0.04);">
              <svg width="18" height="18" viewBox="0 0 24 24" role="img" aria-hidden="true">
                <path d="M12 2l6 10h-4v10h-4V12H6z" fill="#1e90ff"></path>
              </svg>
            </div>
            <div>
              <div><span style="font-weight:600;">Wind</span>: <span id="wt-speed">-</span></div>
              <div style="opacity:0.85;"><span id="wt-dir">-</span>°</div>
            </div>
          </div>
        </div>
        <div id="wt-tide" style="display:none; margin-top:10px;">
          <div style="font-weight:600; margin-bottom:4px;">Next tides</div>
          <div id="wt-tide-items" style="opacity:0.95;"></div>
        </div>
        {% if placeName == 'siargao' %}
        <div id="wt-surf" style="display:none; margin-top:10px;">
          <div style="font-weight:600; margin-bottom:4px;">Best surf now</div>
          <div id="wt-surf-items" style="opacity:0.95;"></div>
        </div>
        {% endif %}
        <div id="wt-note" style="margin-top:8px; opacity:0.7; display:none;"></div>
        </div>
      `;
      L.DomEvent.disableClickPropagation(container);
      L.DomEvent.disableScrollPropagation(container);
      return container;
    };
    windTideControl.addTo(map);

    // Minimize/maximize Wind/Tide widget (persisted in localStorage)
    const WT_COLLAPSE_KEY = 'windtide:collapsed';
    function setWindTideCollapsed(collapsed) {
      const details = document.getElementById('wt-details');
      const toggle = document.getElementById('wt-toggle');
      if (details) details.style.display = collapsed ? 'none' : '';
      if (toggle) toggle.textContent = collapsed ? '▸' : '▾';
      try { localStorage.setItem(WT_COLLAPSE_KEY, collapsed ? '1' : '0'); } catch {}
    }

    function initWindTideCollapse() {
      const toggle = document.getElementById('wt-toggle');
      if (!toggle) return;

      let stored = null;
      try { stored = localStorage.getItem(WT_COLLAPSE_KEY); } catch {}

      const defaultCollapsed = (window.innerWidth && window.innerWidth < 768);
      const initialCollapsed = stored === '1' ? true : stored === '0' ? false : defaultCollapsed;
      setWindTideCollapsed(initialCollapsed);

      toggle.addEventListener('click', () => {
        const details = document.getElementById('wt-details');
        const isCollapsed = details ? (details.style.display === 'none') : false;
        setWindTideCollapsed(!isCollapsed);
      });
    }
    initWindTideCollapse();

    function setWindTideStatus(text) {
      const el = document.getElementById('wt-status');
      if (el) el.textContent = text;
    }

    function bearingToText(deg) {
      if (typeof deg !== 'number' || Number.isNaN(deg)) return '-';
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    function formatLocalTime(isoString) {
      try {
        const d = new Date(isoString);
        if (Number.isNaN(d.getTime())) return isoString;
        return d.toLocaleString(undefined, { weekday: 'short', hour: '2-digit', minute: '2-digit' });
      } catch {
        return isoString;
      }
    }

    function formatLocalDateTime(ms) {
      try {
        const d = new Date(ms);
        if (Number.isNaN(d.getTime())) return '-';
        return d.toLocaleString(undefined, { weekday: 'short', hour: '2-digit', minute: '2-digit' });
      } catch {
        return '-';
      }
    }

    {% if placeName == 'siargao' %}
    // Keep last known conditions so we can rank surf spots.
    let lastWindDirDeg = null; // wind coming-from direction in degrees
    let lastTideSummary = null; // { nextType: 'high'|'low', nextTimeMs: number }
    let lastRecommendedSurfSpotNames = [];

    function setRecommendedSurfMarkers(names) {
      try {
        const markers = window.__siargaoSurfMarkers;
        if (!markers) return;

        // Remove pulse from previously recommended markers.
        for (const prevName of (Array.isArray(lastRecommendedSurfSpotNames) ? lastRecommendedSurfSpotNames : [])) {
          if (!prevName || !markers[prevName]) continue;
          const el = markers[prevName].getElement();
          const inner = el ? el.querySelector('.surf-marker') : null;
          if (inner) inner.classList.remove('recommended');
        }

        const nextNames = Array.isArray(names) ? names : [];
        lastRecommendedSurfSpotNames = nextNames;

        // Add pulse to all currently recommended markers.
        for (const nextName of nextNames) {
          if (!nextName || !markers[nextName]) continue;
          const el = markers[nextName].getElement();
          const inner = el ? el.querySelector('.surf-marker') : null;
          if (inner) inner.classList.add('recommended');
        }
      } catch {
        // Ignore DOM/leaflet timing issues.
      }
    }

    function dirToDeg(dir) {
      const map = { N: 0, NNE: 22.5, NE: 45, ENE: 67.5, E: 90, ESE: 112.5, SE: 135, SSE: 157.5, S: 180, SSW: 202.5, SW: 225, WSW: 247.5, W: 270, WNW: 292.5, NW: 315, NNW: 337.5 };
      return map[String(dir).toUpperCase()] ?? null;
    }

    function normalizeDeg(deg) {
      const d = ((deg % 360) + 360) % 360;
      return d;
    }

    function angularDistance(a, b) {
      const da = normalizeDeg(a);
      const db = normalizeDeg(b);
      const diff = Math.abs(da - db);
      return Math.min(diff, 360 - diff);
    }

    function matchesWindPreference(currentWindDeg, bestWind) {
      // bestWind examples:
      // { anyOf: ['W', 'SW'] }
      // { range: ['W', 'SW'] } meaning W..SW (through WSW)
      if (typeof currentWindDeg !== 'number' || !bestWind) return { score: 0, reason: 'No wind' };
      const current = normalizeDeg(currentWindDeg);

      if (bestWind.anyOf && Array.isArray(bestWind.anyOf)) {
        const targets = bestWind.anyOf.map(dirToDeg).filter(v => typeof v === 'number');
        if (!targets.length) return { score: 0, reason: 'No prefs' };
        const best = Math.min(...targets.map(t => angularDistance(current, t)));
        // Tight match <= 25°, ok match <= 45°
        if (best <= 25) return { score: 1, reason: 'Wind match' };
        if (best <= 45) return { score: 0.6, reason: 'Near match' };
        return { score: 0, reason: 'Mismatch' };
      }

      if (bestWind.range && Array.isArray(bestWind.range) && bestWind.range.length === 2) {
        const a = dirToDeg(bestWind.range[0]);
        const b = dirToDeg(bestWind.range[1]);
        if (typeof a !== 'number' || typeof b !== 'number') return { score: 0, reason: 'No prefs' };

        // Check if current is within arc from a -> b (shortest? we want W to SW specifically).
        // We'll accept either direction, using distance to closest endpoint + midpoints as a heuristic.
        const distA = angularDistance(current, a);
        const distB = angularDistance(current, b);
        const best = Math.min(distA, distB);
        if (best <= 25) return { score: 1, reason: 'Wind match' };
        if (best <= 45) return { score: 0.6, reason: 'Near match' };
        return { score: 0, reason: 'Mismatch' };
      }

      return { score: 0, reason: 'No prefs' };
    }

    function tideScore(bestTide, tideSummary) {
      // tideSummary: { nextType, nextTimeMs }
      // bestTide: 'high' | 'mid' | 'low' | 'mid-high' | 'mid-low'
      if (!bestTide || !tideSummary || !tideSummary.nextType || !tideSummary.nextTimeMs) return 0;
      const now = Date.now();
      const minutes = (tideSummary.nextTimeMs - now) / 60000;
      if (!Number.isFinite(minutes)) return 0;

      const pref = String(bestTide).toLowerCase();
      const next = String(tideSummary.nextType).toLowerCase();

      if (pref === 'high' || pref === 'low') {
        if (next !== pref) return 0;
        // best if next preferred tide is within 4 hours
        if (minutes <= 240) return 1;
        if (minutes <= 360) return 0.5;
        return 0;
      }

      if (pref === 'mid') {
        // mid-tide is usually between extremes; approximate by being 1–4 hours away from next extreme
        if (minutes >= 60 && minutes <= 240) return 1;
        if (minutes >= 30 && minutes < 60) return 0.5;
        return 0;
      }

      if (pref === 'mid-high') {
        if (next !== 'high') return 0;
        if (minutes >= 30 && minutes <= 240) return 1;
        return 0.5;
      }

      if (pref === 'mid-low') {
        if (next !== 'low') return 0;
        if (minutes >= 30 && minutes <= 240) return 1;
        return 0.5;
      }

      return 0;
    }

    function bestWindLabel(bestWind) {
      if (!bestWind) return '-';
      if (bestWind.anyOf) return bestWind.anyOf.join('/');
      if (bestWind.range) return `${bestWind.range[0]} to ${bestWind.range[1]}`;
      return '-';
    }

    function updateSurfRecommendations() {
      const wrap = document.getElementById('wt-surf');
      const items = document.getElementById('wt-surf-items');
      if (!wrap || !items) return;

      if (typeof lastWindDirDeg !== 'number' || !Array.isArray(window.__siargaoSurfSpotsMeta)) {
        wrap.style.display = 'none';
        return;
      }

      const ranked = window.__siargaoSurfSpotsMeta
        .map(s => {
          const wind = matchesWindPreference(lastWindDirDeg, s.bestWind);
          const tide = tideScore(s.bestTide, lastTideSummary);
          const score = (wind.score * 0.7) + (tide * 0.3);
          return { ...s, score, windReason: wind.reason, tideScore: tide };
        })
        .sort((a, b) => b.score - a.score);

      const top = ranked.filter(r => r.score > 0).slice(0, 4);
      if (!top.length) {
        wrap.style.display = 'none';
        setRecommendedSurfMarkers([]);
        return;
      }

      wrap.style.display = '';
      items.innerHTML = top.map(s => {
        const tideText = s.bestTide ? ` · Tide: ${String(s.bestTide).toUpperCase()}` : '';
        return `<div style="margin-bottom:4px;"><span style="font-weight:700;">${s.name}</span><div style="opacity:0.85;">Best wind: ${bestWindLabel(s.bestWind)}${tideText}</div></div>`;
      }).join('');

      // Pulse-highlight every spot in the current recommendation list.
      setRecommendedSurfMarkers(top.map(s => s.name));
    }
    {% endif %}

    async function fetchWind(lat, lng) {
      // Open-Meteo current wind at 10m
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lng)}&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Wind HTTP ${res.status}`);
      const data = await res.json();
      const current = data && data.current ? data.current : null;
      return {
        speedKn: current ? current.wind_speed_10m : null,
        dirDeg: current ? current.wind_direction_10m : null,
      };
    }

    async function fetchTideExtremes(lat, lng) {
      if (!STORMGLASS_API_KEY) return null;

      const cached = readStormglassCache(lat, lng);
      if (cached) return { data: cached.data, fetchedAt: cached.fetchedAt, source: 'cache' };

      const url = `https://api.stormglass.io/v2/tide/extremes/point?lat=${encodeURIComponent(lat)}&lng=${encodeURIComponent(lng)}`;
      const fetchedAt = Date.now();
      const res = await fetch(url, {
        headers: {
          'Authorization': STORMGLASS_API_KEY,
        },
      });
      if (!res.ok) throw new Error(`Tide HTTP ${res.status}`);
      const data = await res.json();
      const tideData = data && data.data ? data.data : [];
      writeStormglassCache(lat, lng, tideData, fetchedAt);
      return { data: tideData, fetchedAt, source: 'api' };
    }

    async function updateWindTide(lat, lng) {
      setWindTideStatus('Loading…');
      const noteEl = document.getElementById('wt-note');
      if (noteEl) noteEl.style.display = 'none';

      const updatedEl = document.getElementById('wt-updated');
      if (updatedEl) updatedEl.style.display = 'none';

      try {
        const [wind, tide] = await Promise.all([
          fetchWind(lat, lng),
          fetchTideExtremes(lat, lng).catch((e) => {
            // Don’t block wind UI if tide fails.
            console.warn('Tide fetch failed:', e);
            return 'error';
          }),
        ]);

        const windWrap = document.getElementById('wt-wind');
        const speedEl = document.getElementById('wt-speed');
        const dirEl = document.getElementById('wt-dir');
        const arrowEl = document.getElementById('wt-arrow');
        if (windWrap) windWrap.style.display = '';
        if (speedEl) speedEl.textContent = (wind.speedKn ?? '-') + ' kn';
        if (dirEl) dirEl.textContent = (wind.dirDeg ?? '-');
        if (arrowEl && typeof wind.dirDeg === 'number') {
          // Rotate arrow so it points *towards* where the wind is going.
          // Wind direction is typically “coming from”, so add 180.
          const rotation = (wind.dirDeg + 180) % 360;
          arrowEl.style.transform = `rotate(${rotation}deg)`;
        }

        {% if placeName == 'siargao' %}
        if (typeof wind.dirDeg === 'number') {
          lastWindDirDeg = wind.dirDeg;
        }
        {% endif %}

        const tideWrap = document.getElementById('wt-tide');
        const tideItemsEl = document.getElementById('wt-tide-items');
        if (tide === null) {
          if (tideWrap) tideWrap.style.display = 'none';
          if (noteEl) {
            noteEl.textContent = 'Tide: add a Stormglass API key to enable.';
            noteEl.style.display = '';
          }
        } else if (tide === 'error') {
          if (tideWrap) tideWrap.style.display = 'none';
          if (noteEl) {
            noteEl.textContent = 'Tide: unavailable (API error).';
            noteEl.style.display = '';
          }
        } else {
          const tideData = (tide && tide.data) ? tide.data : (Array.isArray(tide) ? tide : []);
          const upcoming = (Array.isArray(tideData) ? tideData : [])
            .filter(item => item && item.time)
            .slice(0, 4);
          if (tideWrap) tideWrap.style.display = upcoming.length ? '' : 'none';
          if (tideItemsEl) {
            tideItemsEl.innerHTML = upcoming.length
              ? upcoming.map(item => {
                  const type = item.type ? String(item.type) : 'tide';
                  const height = (item.height !== undefined && item.height !== null) ? ` — ${Number(item.height).toFixed(2)} m` : '';
                  return `<div>${formatLocalTime(item.time)}: <span style="font-weight:600;">${type}</span>${height}</div>`;
                }).join('')
              : '';
          }

          {% if placeName == 'siargao' %}
          // Use the next extreme as a lightweight tide "state" for scoring.
          if (upcoming.length) {
            const next = upcoming[0];
            const nextType = next.type ? String(next.type).toLowerCase() : null;
            const nextTimeMs = next.time ? new Date(next.time).getTime() : null;
            if (nextType && Number.isFinite(nextTimeMs)) {
              lastTideSummary = { nextType, nextTimeMs };
            }
          }
          updateSurfRecommendations();
          {% endif %}

          if (updatedEl) {
            const fetchedAt = (tide && typeof tide.fetchedAt === 'number') ? tide.fetchedAt : Date.now();
            const suffix = (tide && tide.source === 'cache') ? ' (cached)' : '';
            updatedEl.textContent = `Updated: ${formatLocalDateTime(fetchedAt)}${suffix}`;
            updatedEl.style.display = '';
          }
        }

        setWindTideStatus(`${bearingToText(wind.dirDeg)} · updated`);

        {% if placeName == 'siargao' %}
        // If we didn't have tide data, still update based on wind.
        updateSurfRecommendations();
        {% endif %}

        // If tide isn't available, still show an updated time for wind.
        if (updatedEl && (tide === null || tide === 'error')) {
          updatedEl.textContent = `Updated: ${formatLocalDateTime(Date.now())}`;
          updatedEl.style.display = '';
        }
      } catch (e) {
        console.warn('Wind/Tide update failed:', e);
        setWindTideStatus('Wind/Tide unavailable');
        const windWrap = document.getElementById('wt-wind');
        const tideWrap = document.getElementById('wt-tide');
        if (windWrap) windWrap.style.display = 'none';
        if (tideWrap) tideWrap.style.display = 'none';
      }
    }

    // Initial update for map center.
    updateWindTide(center[0], center[1]);

    {% if placeName == 'siargao' %}
    
    const surfing_spots = [
      {
    name: 'Cloud 9 – General Luna, Siargao Island',
    coords: [9.814122537439955, 126.16603815940445],
    bestWind: { anyOf: ['W'] },
    bestTide: 'high',
    level: 'Intermediate to Pro (depending on conditions)',
    notes: 'High tide is safer. Very shallow reef at low tide; strong rip currents; crowded.'
  },
      {
    name: 'Salvacion, Siargao Island',
    coords: [9.850188339923273, 126.11024674272298],
    bestWind: { anyOf: ['W','SW'] },
    bestTide: 'mid-high',
    level: 'Intermediate to Advanced',
    notes: 'Low tide makes the spot hazardous.'
  },
  {
    name: 'Daku Island – Siargao',
    coords: [9.8270, 126.1570],
    bestWind: { anyOf: ['W','SW'] },
    bestTide: 'mid-high',
    level: 'Intermediate / Advanced',
    notes: 'Offshore (W/SW). Better at mid to high tide.'
  },
  {
    name: 'Big Wish (Pacifico) – Siargao',
    coords: [9.944458687195885, 126.10536970025947],
    bestWind: { anyOf: ['SW'] },
    bestTide: null,
    level: 'Advanced',
    notes: 'Sharp/shallow reef; strong currents; not beginner-friendly; surf booties recommended.'
  },
  {
    name: 'Pesangan / Cemetery – Siargao Island',
    coords: [9.785416942356362, 126.17769394935351],
    bestWind: { range: ['W', 'SW'] },
    bestTide: 'mid-low',
    level: 'Intermediate to Advanced',
    notes: 'Ideal wind W to SW (offshore). Best at mid to low tide.'
  },
  {
    name: 'Tuason Point – Siargao Island',
    coords: [9.810123595825537, 126.17051188883079],
    bestWind: { anyOf: ['SW'] },
    bestTide: 'high',
    level: 'Intermediate / Advanced',
    notes: 'Best on high tide.'
  },
  {
    name: 'Jacking Horse – Siargao Island',
    coords: [9.815861013100585, 126.16420448695715],
    bestWind: { anyOf: ['E','SE'] },
    bestTide: 'mid',
    level: 'Beginners / Intermediate',
    notes: 'Beginner-friendly when conditions are mellow.'
  },
  {
    name: 'Quicksilver Surf Spot',
    coords: [9.814681639305713, 126.16626794390966],
    bestWind: { anyOf: ['W'] },
    bestTide: 'mid',
    level: 'Intermediate to Advanced (depending on season)',
    notes: 'Mid tide often works best.'
  },
{
    name: 'Stimpy’s – Siargao Island',
    coords: [9.844260240666923, 126.15810900583924], // classic left-hander break requiring boat access (approx) :contentReference[oaicite:6]{index=6}
},
{
    name: 'Rock Island – Siargao Island',
    coords: [9.839009532277313, 126.16111978482675], // advanced reef break off Rock Island (approx) :contentReference[oaicite:7]{index=7}
},
{
    name: 'Giwan / Union / Secret Spot – North of General Luna',
    coords: [9.749345393476315, 126.09221407253548], // group of closely-located beginner/intermediate breaks (approx) :contentReference[oaicite:8]{index=8}
},
  {
    name: 'Tangbo / Secret Paradise Beach ',
    coords: [10.044311843684122, 126.0426309413861], // not a surf-spot ranking item
  },

    ]

    // Surf spots with metadata (used for recommendations)
    window.__siargaoSurfSpotsMeta = surfing_spots
      .filter(s => s && s.bestWind)
      .map(s => ({
        name: s.name,
        coords: s.coords,
        bestWind: s.bestWind,
        bestTide: s.bestTide,
        level: s.level,
        notes: s.notes,
      }));
    {% endif %}
    const places = [
{% for spot in tourist_spots %}
{
url: '{{ spot.url }}',
id: '{{ spot.spot_id }}',
name: '{{ spot.name }}',
desc: '{{ spot.desc }}',
coords: {{ spot.coords|safe }},
img: '{{ spot.img }}',
visit_count: {{ spot.visit_count }}
}{% if not forloop.last %},{% endif %}
{% endfor %}
    ];

    const markers = {};
    // Calculate max visit count for proportional sizing
    const maxVisitCount = Math.max(...places.map(p => p.visit_count || 0));
    const baseSize = 10;
    const maxSize = 25;
    const scaleFactor = maxVisitCount > 0 ? (maxSize - baseSize) / maxVisitCount : 0;
    
    places.forEach(p => {
      let lat = p.coords.lat !== undefined ? p.coords.lat : (p.coords.latitude !== undefined ? p.coords.latitude : p.coords[0]);
      let lng = p.coords.lng !== undefined ? p.coords.lng : (p.coords.longitude !== undefined ? p.coords.longitude : p.coords[1]);
      const size = baseSize + (p.visit_count || 0) * scaleFactor;
      const icon = L.divIcon({className:'', html:`<div style="width:${size}px; height:${size}px; border-radius:${size/2}px; background:#ff0000; box-shadow:0 0 6px rgba(255,0,0,0.8); position:relative;"></div>`, iconSize:[size,size], iconAnchor:[size/2,size/2]});
      const m = L.marker([lat, lng], {icon}).addTo(map).bindPopup(`<strong>${p.name}</strong><br>${p.desc}
      <div><a style="text-decoration:none" href="${p.url}" target="_blank" >Read Here</a> </div>
      

      <img class="image-desc" src="${p.img}" alt="${p.name}">
      
      <div><a style="text-decoration:none" href="https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${lat},${lng}" target="_blank">📍 Get Directions</a></div>
      `);
      markers[p.id] = m;
    });

    const placesDiv = document.getElementById('places');
    places.forEach(p => {
      let lat = p.coords.lat !== undefined ? p.coords.lat : (p.coords.latitude !== undefined ? p.coords.latitude : p.coords[0]);
      let lng = p.coords.lng !== undefined ? p.coords.lng : (p.coords.longitude !== undefined ? p.coords.longitude : p.coords[1]);
      const el = document.createElement('div'); el.className='place'; el.textContent = p.name;
      el.onclick = () => { map.flyTo([lat, lng], 14, {duration:1.2}); markers[p.id].openPopup(); document.getElementById("toggleSidebar").click(); };
      placesDiv.appendChild(el);
    });

    document.getElementById('flyAll').onclick = ()=>{const group=L.featureGroup(Object.values(markers)); map.fitBounds(group.getBounds().pad(0.3));closeQuickPlaces()}
    const coordDiv=L.control({position:'bottomleft'});
    coordDiv.onAdd=function(){const d=L.DomUtil.create('div','');d.style.padding='6px 10px';d.style.background='rgba(255,255,255,0.9)';d.style.borderRadius='6px';d.style.fontSize='12px';d.innerHTML='Lat: -, Lng: -';return d;};
    coordDiv.addTo(map);
    map.on('mousemove',function(e){coordDiv.getContainer().innerHTML=`Lat: ${e.latlng.lat.toFixed(4)}, Lng: ${e.latlng.lng.toFixed(4)}`});





    {% if placeName == 'siargao' %}
    const surfing_items = {}
    surfing_spots.forEach(spot => {
      let [lat, lng] = spot.coords;
      const icon = L.divIcon({className:'', html:`<div class="surf-marker"></div>`, iconSize:[18,18], iconAnchor:[9,9]});
      const bestWindText = spot.bestWind ? (spot.bestWind.anyOf ? spot.bestWind.anyOf.join('/') : (spot.bestWind.range ? `${spot.bestWind.range[0]} to ${spot.bestWind.range[1]}` : '-')) : '-';
      const bestTideText = spot.bestTide ? String(spot.bestTide).toUpperCase() : '-';
      const levelText = spot.level ? String(spot.level) : '-';
      const notesText = spot.notes ? String(spot.notes) : '';

      const popupHtml = `
        <strong>${spot.name}</strong>
        ${spot.bestWind ? `<div><span style="font-weight:600;">Best wind</span>: ${bestWindText}</div>` : ''}
        ${spot.bestTide ? `<div><span style="font-weight:600;">Best tide</span>: ${bestTideText}</div>` : ''}
        ${spot.level ? `<div><span style="font-weight:600;">Level</span>: ${levelText}</div>` : ''}
        ${notesText ? `<div style="opacity:0.9; margin-top:6px;">${notesText}</div>` : ''}
        <div style="margin-top:8px;"><a style="text-decoration:none" href="https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${lat},${lng}" target="_blank">📍 Get Directions</a></div>
      `;

      const m = L.marker(spot.coords, {icon}).addTo(map).bindPopup(popupHtml);
      surfing_items[spot.name] = m;
    });

    // expose for highlight logic
    window.__siargaoSurfMarkers = surfing_items;

    // If wind already loaded before surf spots, render recommendations now.
    updateSurfRecommendations();
    {% endif %}

    document.addEventListener('DOMContentLoaded', () => {
      const attribution = document.querySelector('.leaflet-control-attribution');
      if (attribution) attribution.style.display = 'none';
      const latlongindic = document.querySelector('.leaflet-bottom') 
      if (latlongindic) latlongindic.style.display = 'none';

    });

  </script>
</body>
</html>
